server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: nocs

# CORS: comma-separated origins for nocs-web (Next.js dev typically uses 3000)
nocs:
  cors:
    allowed-origins: ${NOCS_CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  # ZWO EAF SDK path (libEAFFocuser.so or libEAFFocuser.bin). Empty = auto-detect.
  eaf:
    sdk-path: ${NOCS_EAF_SDK_PATH:}

# OpenAPI / Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
